<h2>Admission Form:</h2>
<br />
<form action="">
  <label for="name">Name: </label>
  <input type="text" name="" id="name" />
  <br />
  <br />
  <label for="age">Age: </label>
  <input type="number" name="" id="age" />
  <br />
  <br />
  <label for="email">Email: </label>
  <input
    type="email"
    name=""
    id="email"
    placeholder="Enter Your Personal Email"
    required
  />
  <br />
  <br />
  <label for="dept">Department: </label>
  <select name="" id="dept">
    <option value="">CSE</option>
    <option value="">SWE</option>
    <option value="">CIS</option>
    <option value="">NFE</option>
  </select>
  <br />
  <br />
  <label for="bdate">Date of Birth: </label>
  <input type="date" name="" id="bdate" />
  <br />
  <br />
  <label for="address">Address: </label>
  <br />
  <br />
  <textarea
    name=""
    id="address"
    cols="25"
    rows="4"
    placeholder="Must be give Village, Post-Office, Upazila, District"
  ></textarea>
  <br />
  <br />
  <label for="pass">Password: </label>
  <input type="password" name="" id="pass" placeholder="Set a password" />
  <br>
  <br>
  <button type="submit">Submit</button>
  <button type="reset">Reset</button>
</form>
